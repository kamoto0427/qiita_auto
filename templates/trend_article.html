{% extends "base.html" %}

{% block title %}トレンド記事生成 - Qiita Admin{% endblock %}
{% block page_title %}トレンド記事生成{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- 検索フォーム -->
  <div class="bg-white rounded-lg shadow p-6">
    <h3 class="text-base font-semibold text-gray-700 mb-4">検索条件</h3>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <!-- キーワード/タグ -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-600 mb-1">
          キーワード / タグ
          <span class="text-xs text-gray-400 font-normal ml-2">例: ClaudeCode / tag:Python / Claude Code</span>
        </label>
        <input id="query-input" type="text" placeholder="ClaudeCode"
               class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </div>

      <!-- 期間 From -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">期間（開始）</label>
        <input id="date-from" type="month"
               class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </div>

      <!-- 期間 To -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">期間（終了）</label>
        <input id="date-to" type="month"
               class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </div>

      <!-- 最低いいね数 -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">最低いいね数</label>
        <input id="min-likes" type="number" value="10" min="0"
               class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </div>

      <!-- 最低ストック数 -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">最低ストック数</label>
        <input id="min-stocks" type="number" value="10" min="0"
               class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </div>
    </div>

    <div class="flex items-center gap-4">
      <button id="generate-btn"
              class="px-6 py-2 bg-blue-600 text-white text-sm font-medium rounded hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        記事を生成
      </button>
      <span id="status-msg" class="text-sm text-gray-500">条件を入力して「記事を生成」を押してください</span>
    </div>
  </div>

  <!-- 結果エリア -->
  <div id="results-area" class="hidden space-y-6">

    <!-- 統計バッジ -->
    <div class="flex gap-4 text-sm">
      <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full">
        取得記事数: <strong id="total-fetched">0</strong> 件
      </span>
      <span class="bg-green-50 text-green-700 px-3 py-1 rounded-full">
        フィルター後: <strong id="total-filtered">0</strong> 件
      </span>
    </div>

    <!-- タブ -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="flex border-b border-gray-200">
        <button id="tab-preview" onclick="switchTab('preview')"
                class="px-6 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600">
          プレビュー
        </button>
        <button id="tab-raw" onclick="switchTab('raw')"
                class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
          Markdown (コピー用)
        </button>
      </div>

      <!-- プレビュータブ -->
      <div id="pane-preview" class="p-6">
        <div id="markdown-preview"
             class="prose max-w-none text-sm leading-relaxed">
        </div>
      </div>

      <!-- Rawタブ -->
      <div id="pane-raw" class="hidden p-6">
        <div class="flex justify-end mb-2">
          <button id="copy-btn"
                  class="px-4 py-1.5 bg-gray-700 text-white text-xs font-medium rounded hover:bg-gray-800 transition-colors">
            クリップボードにコピー
          </button>
        </div>
        <textarea id="markdown-raw"
                  class="w-full h-[36rem] p-4 font-mono text-xs border border-gray-200 rounded bg-gray-50 resize-y focus:outline-none focus:ring-2 focus:ring-blue-300"
                  readonly></textarea>
      </div>
    </div>

  </div>

</div>
{% endblock %}

{% block scripts %}
<!-- marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- GitHub Markdown CSS (via CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
<style>
  .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 100%; }
  table { border-collapse: collapse; width: 100%; }
  table th, table td { border: 1px solid #d0d7de; padding: 6px 12px; }
  table th { background: #f6f8fa; }
</style>
<script src="/static/js/trend_article.js"></script>
{% endblock %}
